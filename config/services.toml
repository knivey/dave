[openai]
key = "UR KEY HERE :P"
maxcompletiontokens = 600
baseurl = "https://api.openai.com/v1/"
temperature = 0.7  # optional
imageformat = "jpg"      # default image format for chat commands
imagequality = 75
maximagesize = "1024x1024"
# toolverbose = false  # hide 🔧 tool call notifications in IRC (default: true)

[local]
maxtokens = 500
baseurl = "http://192.168.100.45:8000/v1"
temperature = 0.7  # optional
#this is just a default that can be overriden in command configs
#if left undefined it defaults to 8
#its the most number of previous interactions (including ai responses) to send back for context
maxhistory = 8
imageformat = "jpg"
imagequality = 75
maximagesize = "1024x1024"

[grok]
key = "xai-YOUR-KEY-HERE"  # Grok/x.ai API key
maxtokens = 6000
baseurl = "https://api.x.ai/v1/"
temperature = 0.7  # optional creativity (0=deterministic)
imageformat = "jpg"
imagequality = 75
maximagesize = "1024x1024"

[sd]
baseurl = "http://192.168.100.45:7860"

[comfy]
baseurl = "http://192.168.100.45:8188"
comfy_timeout = 300
temperature = 0.7  # optional