# notices.toml — Override default bot notice/reply templates.
# All fields are optional. Missing fields use hardcoded defaults.
# Placeholders are {key} style, expanded at runtime.
#
# [queue] options:
#   msg              (string)    Queue position notice. Placeholders: {position}, {eta}
#   started          (string)    Processing started notice. Placeholders: {nick}, {wait}, {prompt}, {position}, {eta}
#   async_submitted  (string)    Async image job submitted notice. Placeholders: {nick}
#   stopped          (string)    Generation stopped by user
#
# [rate] options:
#   msgs             (string[])  Random pick for rate-limit notice
#
# [format] options:
#   error_prefix     (string)    IRC format prefix for error messages
#   warn_prefix      (string)    IRC format prefix for warning messages
#
# [context] options:
#   no_context       (string)    No active chat context. Placeholders: (none)
#
# [sessions] options:
#   header           (string)    Session list header. Placeholders: {nick}, {network}
#   none             (string)    No sessions found
#   detail_header    (string)    Session detail header. Placeholders: {id}, {command}, {count}, {active}, {archived}, {archived_suffix}, {total}, {cloned_from}
#   truncated        (string)    Truncated messages indicator. Placeholders: {count}
#   not_found        (string)    Session not found
#   not_owned        (string)    Session belongs to another user
#   invalid_id       (string)    Invalid session ID
#   no_messages      (string)    Session has no messages
#   command_gone     (string)    Chat command no longer exists. Placeholders: {command}
#   deleted          (string)    Session deleted. Placeholders: {id}
#   paused           (string)    Previous session paused. Placeholders: {id}
#   resumed          (string)    Session resumed. Placeholders: {id}, {command}, {count}
#   switched         (string)    Session auto-switched. Placeholders: {nick}, {id}, {trigger}, {old_id}
#   stats_format     (string)    User stats. Placeholders: {network}, {channel}, {sessions}, {messages}
#   history_usage    (string)    Usage hint. Placeholders: {trigger}
#   delete_usage     (string)    Usage hint. Placeholders: {trigger}
#   resume_usage     (string)    Usage hint. Placeholders: {trigger}
#   other_header     (string)    Another user's session list header. Placeholders: {nick}, {network}
#   other_none       (string)    No sessions for target user. Placeholders: {nick}
#   all_header       (string)    All sessions header. Placeholders: {network}, {channel}
#
# [db] options:
#   not_available    (string)    Database unavailable
#   query_sessions   (string)    Query sessions error. Placeholders: {error}
#   load_messages    (string)    Load messages error. Placeholders: {error}
#   delete_failed    (string)    Delete session error. Placeholders: {error}
#   query_stats      (string)    Query stats error. Placeholders: {error}
#   query_jobs       (string)    Query jobs error. Placeholders: {error}
#   process_images   (string)    Image processing error. Placeholders: {error}
#   pastebin_upload  (string)    Pastebin upload error. Placeholders: {error}
#   internal_error   (string)    Internal/panic error. Placeholders: {error}
#
# [images] options:
#   limit_reached    (string)    Image context limit hit. Placeholders: {max}
#   partial_limit    (string)    Partial image limit. Placeholders: {remaining}, {used}, {max}
#   no_images        (string)    Job returned no images. Placeholders: {nick}
#   job_status       (string)    Job non-completed status. Placeholders: {nick}, {status}, {error}
#
# [tools] options:
#   call             (string)    Tool call notification (single). Placeholders: {server}, {tool}
#   call_multi       (string)    Tool call notification (multiple parallel). Placeholders: {tools}
#   call_limit       (string)    Tool iteration limit reached
#   failed           (string)    MCP tool call failed. Placeholders: {error}
#   usage            (string)    Missing argument usage. Placeholders: {arg}
#   unexpected       (string)    Unexpected async response
#   tool_async_started (string)  Started override for async tool job delivery. Placeholders: {nick}, {wait}, {prompt}, {position}, {eta}
#
# [pastebin] options:
#   link             (string)    Pastebin URL link. Placeholders: {url}
#   failed           (string)    Pastebin fallback when upload fails
#
# [jobs] options:
#   no_jobs          (string)    No active jobs
#   queue_header     (string)    Queue section header
#   queue_running    (string)    Running queue item. Placeholders: {desc}, {elapsed}
#   queue_pending    (string)    Pending queue item. Placeholders: {position}, {desc}, {wait}
#   bg_header        (string)    Background jobs section header
#   bg_line          (string)    Background job line. Placeholders: {icon}, {job_id}, {tool}, {server}, {status}, {elapsed}
#
# [bans] options:
#   ban_created      (string)    Ban created notice. Placeholders: {nick}, {duration}, {reason}
#   ban_list         (string)    Active ban list line. Placeholders: {nick}, {reason}, {expires}
#   ban_list_empty   (string)    No active bans
#   ban_history      (string)    Ban history line. Placeholders: {id}, {active}, {reason}, {duration}, {banner}
#   unbanned         (string)    User unbanned notice. Placeholders: {nick}
#   user_not_found   (string)    User not found for ban operation. Placeholders: {nick}
#   amibanned        (string)    Per-ban line for !amibanned. Placeholders: {reason}, {remaining}, {banner}
#   amibanned_none   (string)    No active bans for !amibanned
#
# [compaction] options:
#   started      (string)  Compaction started notice.
#   completed    (string)  Compaction completed. Placeholders: {count}, {tokens_in}, {tokens_out}, {duration}, {prompt}, {completion}, {total}, {cached}, {reasoning}
#   failed       (string)  Compaction failed. Placeholders: {error}
#   too_short    (string)  Not enough history to compact.
#   no_active    (string)  No active session to compact.
#   in_progress  (string)  Compaction already running.
#   disabled     (string)  Compaction disabled in config.
#   auto_notice  (string)  Auto-compaction notice. Placeholders: {count}, {tokens_in}, {tokens_out}, {duration}, {prompt}, {completion}, {total}, {cached}, {reasoning}
#
# [clone] options:
#   cloned            (string)  Clone success. Placeholders: {id}, {source_nick}, {source_id}, {count}
#   no_target_session (string)  Target nick has no active session. Placeholders: {nick}
#   target_not_found  (string)  Target nick not resolved. Placeholders: {nick}
#   session_not_found (string)  Session ID not found. Placeholders: {id}
#   wrong_channel     (string)  Session is in a different channel. Placeholders: {id}
#   incomplete_calls  (string)  Session has incomplete tool calls. Placeholders: {id}
#   command_gone      (string)  Chat command no longer exists. Placeholders: {command}
#   usage             (string)  Usage hint. Placeholders: {trigger}
#
# [users] options:
#   resolve_transient  (string)  Sent (as warnMsg) when resolveUser exhausts its retries on transient DB errors. Placeholders: {nick}
#   resolve_persistent (string)  Sent (as warnMsg) when resolveUser fell back to creating a flagged placeholder row, or when even that fallback failed. Placeholders: {nick}
#
# support           (string)     Support message
#
# Example with all options set to defaults:
# [queue]
# msg = "\x0307⏳ Queued (position {position})\x0F"
# started = "\x0306▶ {nick}: Processing your request (waited {wait})...{prompt}\x0f"
