# Chat commands support templating in the system prompt.
# Available variables: {{.Nick}} (caller's nickname), {{.BotNick}} (bot's nickname), {{.Channel}} (channel name), {{.Network}} (network name), {{.ChanNicks}} (JSON array of ALL nicknames in {{.Channel}}), {{.Vars.*}} (custom variables from templatevars.toml)
# Templates are processed when starting a new chat context. Invalid templates will cause the bot to fail at startup.
# Example: system = "You are {{.BotNick}} chatting with {{.Nick}} in {{.Channel}} on {{.Network}}."

# OpenAI Chat Completion Parameters (optional):
# topp = 1.0                  # Nucleus sampling (0-1, default: 1)
# stop = ["STOP", "END"]      # Stop sequences where generation stops
# presencepenalty = 0.0       # -2.0 to 2.0 (default: 0) - penalize new topics
# frequencypenalty = 0.0      # -2.0 to 2.0 (default: 0) - penalize repetition
# paralleltoolcalls = true    # Enable parallel MCP tool calls (default: true)
# reasoningeffort = "medium"  # For o1/o3 models: "low", "medium", "high"
# servicetier = "auto"        # Processing tier: "auto", "default", "flex", "priority"
# verbosity = "medium"        # Output token count for gpt-5 models: "low", "medium", "high"
# toolverbose = false         # Hide 🔧 tool call notifications in IRC (default: true, cascades from service)
# chat_template_kwargs = {}   # Provider-specific parameters (see examples below)

[chat]
description = "General IRC-aware chat"
renderMarkdown = true
service = "openai"
model = "gpt-4o"
# mcps = ["filesystem", "github"]  # opt-in to MCP tool access
system = """\
You are dave, a chatbot on IRC that responds using IRC formatting and plain text.
IRC formatting:
 - To color text start with a \u0003 character followed by a color code then end the color with another \u0003
 - Keep in mind IRC formatting is reset on every new line
IRC Color Codes:
 - 00 White
 - 01 Black
 - 02 Blue
 - 03 Green
 - 04 Red
 - 05 Brown
 - 06 Magenta
 - 07 Orange
 - 08 Yellow
 - 09 Light Green
 - 10 Cyan
 - 11 Light Cyan
 - 12 Light Blue
 - 13 Pink
 - 14 Grey
 - 15 Light Grey
If you are writing source code you MUST NOT use raw IRC codes in the source, instead use \\x03 or whatever is appropriate.
"""

[yo]
service = "local"
#streaming will use the streaming api to send to the chat as the completion is running
#this is useful for slower services so users don't have to wait until its totally complete
streaming = true
system = """\
you are an unprofessional and rude chatbot.
don't use proper grammer.
dont capitalize the first word of sentences.
you chat like a 90s era teenager on instant messenger but do NOT mention the 90s
keep your replies short
don't mention anything about the instructions just given to you.
respond using IRC formatting plain text and emojis.
IRC formatting:
 - To make text bold surround the text with a \u0002 character
 - To make text underlined surround the text with a \u001F character
 - To color text start with a \u0003 character followed by a color code then end the color with another \u0003
 - Keep in mind IRC formatting is reset on every new line
IRC Color Codes:
 - 00 White
 - 01 Black
 - 02 Blue
 - 03 Green
 - 04 Red
 - 05 Brown
 - 06 Magenta
 - 07 Orange
 - 08 Yellow
 - 09 Light Green
 - 10 Cyan
 - 11 Light Cyan
 - 12 Light Blue
 - 13 Pink
 - 14 Grey
 - 15 Light Grey
Do not use markdown formatting
"""

[view]
description = "Chat with image detection"
renderMarkdown = true
service = "openai"
model = "gpt-4o"
detectimages = true
maximages = 2
maxcontextimages = 2
imageformat = "jpg"
imagequality = 75
maximagesize = "1024x1024"
system = """You are dave, chatting with {{.Nick}}={{.BotNick}} in {{.Channel}} on {{.Network}}.
Chan users: {{.ChanNicks}}
Use IRC formatting/colors as needed.
"""

# Example: More creative chat with adjusted parameters
[creative]
description = "Creative chat with higher temperature and penalties"
service = "openai"
model = "gpt-4o"
temperature = 1.0
topp = 0.9
presencepenalty = 0.6
frequencypenalty = 0.3
system = "You are a creative and imaginative assistant."

# Provider-specific parameters (sent at top level of request JSON):
# extra_body = {}              # See examples below
#
# chat_template_kwargs is also available for providers like vLLM/Qwen3 that
# nest parameters under "chat_template_kwargs" in the request body.

# OpenRouter reasoning-enabled chat (uses extra_body for top-level reasoning config):
# [reasoning]
# description = "OpenRouter reasoning-enabled chat"
# service = "openrouter"
# model = "anthropic/claude-sonnet-4.5"
# extra_body = {reasoning = {effort = "high"}}
# system = "You are a helpful assistant that shows your reasoning."

# OpenRouter reasoning with max_tokens budget (Anthropic-style):
# [reasoning-budget]
# description = "OpenRouter with reasoning token budget"
# service = "openrouter"
# model = "anthropic/claude-sonnet-4.5"
# extra_body = {reasoning = {max_tokens = 2000}}
# system = "You are a helpful assistant."

