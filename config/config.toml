# Main configuration file. All settings can be overriden in network sections.
#
# Root options:
#   trigger             (string)              Command trigger prefix (e.g. "." for .chat, "-" for -chat)
#   quitmsg             (string)              Default quit message
#   uploadurl           (string)              URL prefix for paste uploads
#   max_queue_depth     (int, default: 5)     Max queued requests per network
#   sessions_display_limit (int, default: 10) Max sessions shown in sessions list command
#   hidden_tools        (string array)        Builtin tool names to hide from IRC notifications (default: ["register_background_job"])
#   disabled_builtins   (string array)        Builtin commands to disable (e.g. ["support", "mystats"])
#
# [database] options:
#   driver              (string, default: "sqlite")        Database driver: "sqlite" or "postgres"
#   path                (string, default: "data/dave.db")  SQLite database path (used when driver=sqlite)
#   dsn                 (string)                           PostgreSQL DSN, e.g. "postgres://user:pass@localhost:5432/dave?sslmode=disable" (used when driver=postgres)
#   max_age_days        (int, default: 90)                 Max age for context history
#
# [tui] options:
#   scrollback_lines    (int, default: 5000)  Lines kept in TUI scroll buffer
#
# [tui.scrollbar] options:
#   visible            (bool, default: true)   Show scrollbar
#   show_always        (bool, default: true)   Show even when content fits
#   color              (string, default: "gray")           Scrollbar thumb color
#   background_color   (string, default: "black")          Scrollbar background
#   track_color        (string, default: "darkgray")       Scrollbar track color
#   width              (int, default: 1)      Scrollbar width in cells
#
# [api_log] options:
#   dir                (string, default: "api_logs")  Directory for log files
#   log_raw_stream     (bool, default: false)  Log individual SSE chunks
#
# [incident_log] options:
#   enabled            (bool, default: true)   Enable incident logging on API errors
#   dir                (string, default: "incidents")  Directory for incident files
#
# [pastebin] options:
#   url                (string)               Pastebin API base URL (e.g. "http://localhost:8181")
#   api_key            (string)               API key for authentication
#   pastebin_preview_lines (int, default: 3)  Default preview lines sent before pastebin URL (0 = no preview, must be < max_lines)
#
# [networks.<name>] options:
#   enabled            (bool, default: true)   Enable this network
#   nick               (string)                Bot nickname
#   user               (string, default: nick) IRC username/ident
#   real_name          (string, default: nick) IRC realname/GECOS
#   throttle           (duration)              Minimum time between messages (e.g. "750ms")
#   reconnect_delay    (duration, default: "60s") Delay between reconnection attempts (first reconnect is immediate; "0s" = no delay)
#   quitmsg            (string, inherits root) Network-specific quit message
#   trigger            (string, inherits root) Network-specific command trigger
#
# [networks.<name>.channels."<#channel>"] options:
#   key                (string)                Channel key/password for +k channels
#   pastebin           (bool, default: false)  Auto-paste long messages
#   max_lines          (int, default: 5)       Max lines before truncating/pasting
#   pastebin_preview_lines (int, inherits [pastebin])  Preview lines sent before pastebin URL (0 = no preview)
#
# [[networks.<name>.servers]] options:
#   host               (string)                Server hostname
#   ssl                (bool, default: false)  Use TLS
#   port               (int, default: 6697 ssl / 6667 plain)
#   pass               (string)                SASL or server password
#   insecure_skip_verify (bool, default: false) Skip TLS certificate verification
#
# Duration values: TOML strings like "30s", "2m", "1m30s", "750ms".
#
# Example with all root + nested options:
# trigger = "."
# quitmsg = "goodbye"
# uploadurl = "https://upload.example.com"
# max_queue_depth = 5
# sessions_display_limit = 10
# hidden_tools = ["register_background_job"]
# disabled_builtins = []
#
# [database]
# path = "data/dave.db"
# max_age_days = 90
#
# [tui]
# scrollback_lines = 5000
#
# [tui.scrollbar]
# visible = true
# show_always = true
# color = "gray"
# background_color = "black"
# track_color = "darkgray"
# width = 1
#
# [api_log]
# dir = "api_logs"
# log_raw_stream = false
#
# [incident_log]
# enabled = true
# dir = "incidents"
#
# [pastebin]
# url = "http://localhost:8181"
# api_key = "dave_YOUR_KEY_HERE"
# pastebin_preview_lines = 3
#
# [networks.example]
# enabled = true
# nick = "mybot"
# user = "mybot"
# real_name = "mybot"
# throttle = "750ms"
# reconnect_delay = "60s"
# quitmsg = "bye"
# trigger = "."
#
# [networks.example.channels."#mychannel"]
# key = "channelkey"
# pastebin = true
# max_lines = 10
# pastebin_preview_lines = 5
#
# [[networks.example.servers]]
# host = "irc.example.com"
# ssl = true
# port = 6697
# pass = "sasl-password"
# insecure_skip_verify = false

#these default settings can be overriden in the networks sections
#this is the default trigger for commands Ex: set to . for .chat or - for -chat
trigger = "-"
