[qwen]
description = "Qwen enhanced image generation"
mcp = "img-mcp"
tool = "enhance_and_generate"
arg = "prompt"
timeout = "2m"
args = { workflow = "qwen", output_format = "url" }

[qwenHD]
description = "Qwen enhanced image generation"
