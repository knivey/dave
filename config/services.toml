# Services define API endpoints and shared defaults for chat/completion commands.
# Each service is a [section] referenced by name from commands via `service = "name"`.
# Command-level settings cascade: command override > service default > hardcoded default.
#
# Available options (per [section]):
#   key                  (string)          API key (not required for local/unauthed endpoints)
#   type                 (string)          "openai" (default) or "llama"
#   baseurl              (string)          API base URL (e.g. "https://api.openai.com/v1/")
#   maxtokens            (int)             Max tokens per response (legacy, prefer maxcompletiontokens)
#   maxcompletiontokens  (int)             Max completion tokens per response
#   temperature          (float)           Sampling temperature (0=deterministic, default: 0)
#   maxhistory           (int, default: 100) Max conversation turns sent as context
#   imageformat          (string, default: "jpg")  Image format: "jpg", "jpeg", or "webp"
#   imagequality         (int 1-100, default: 75)   Image quality percentage
#   maximagesize         (string, default: "1024x1024") Max image dimensions "WxH"
#   timeout              (duration, default: 60s)    Overall API call timeout (cascades to commands)
#   streamtimeout        (duration, default: timeout) Max idle time between stream chunks
#   toolverbose          (bool, default: true)       Show 🔧 tool call notifications in IRC
#   paralleltoolcalls    (bool, default: true)       Enable parallel MCP tool calls
#   parallel             (int, default: 1)           Max concurrent requests per command
#
# Duration values: TOML strings like "30s", "2m", "1m30s".
#
# Example with all options:
# [example-service]
# key = "sk-..."
# type = "openai"
# baseurl = "https://api.openai.com/v1/"
# maxtokens = 500
# maxcompletiontokens = 600
# temperature = 0.7
# maxhistory = 100
# imageformat = "jpg"
# imagequality = 75
# maximagesize = "1024x1024"
# timeout = "90s"
# streamtimeout = "45s"
# toolverbose = true
# paralleltoolcalls = true
# parallel = 1

[openai]
key = "UR KEY HERE :P"
maxcompletiontokens = 600
baseurl = "https://api.openai.com/v1/"
temperature = 0.7  # optional
imageformat = "jpg"      # default image format for chat commands
imagequality = 75
maximagesize = "1024x1024"
# toolverbose = false  # hide 🔧 tool call notifications in IRC (default: true)
# paralleltoolcalls = true  # Enable parallel MCP tool calls (default: true, cascades to commands)

[local]
maxtokens = 500
baseurl = "http://192.168.100.45:8000/v1"
temperature = 0.7  # optional
#this is just a default that can be overriden in command configs
#if left undefined it defaults to 8
#its the most number of previous interactions (including ai responses) to send back for context
maxhistory = 8
imageformat = "jpg"
imagequality = 75
maximagesize = "1024x1024"

[grok]
key = "xai-YOUR-KEY-HERE"  # Grok/x.ai API key
maxtokens = 6000
baseurl = "https://api.x.ai/v1/"
temperature = 0.7  # optional creativity (0=deterministic)
imageformat = "jpg"
imagequality = 75
maximagesize = "1024x1024"

[sd]
baseurl = "http://192.168.100.45:7860"

[comfy]
baseurl = "http://192.168.100.45:8188"
comfy_timeout = 300
temperature = 0.7  # optional