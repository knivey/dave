# MCP servers provide tools, resources, and prompts that chat commands can use.
# Tools are automatically injected into the LLM request when a command opts-in via mcps = [...].
# Resources and prompts are available via bridge functions for explicit use.
# Supported transports: "stdio" (spawn a local process), "http" (streamable HTTP), and "sse" (legacy SSE).
#
# Available options (per [section]):
#   transport  (string, required)  "stdio", "http", or "sse"
#   command    (string)            Executable to spawn (required for stdio)
#   args       (string array)      Arguments passed to command
#   env        (string array)      Environment variables in "KEY=value" format (stdio only)
#   url        (string)            HTTP endpoint URL (required for http and sse)
#   timeout    (duration, default: 30s)  Tool call timeout
#   keepalive  (duration)          Ping interval for liveness detection. Default: 30s for http/sse, 0 (disabled) for stdio
#   headers    (string map)        Custom HTTP headers to send with every request (http and sse only)
#
# Hidden MCP tool sets — named groups of tools to exclude from the LLM's tool list.
# Tool names can be bare ("tool_name") or server-prefixed ("server.tool_name") for disambiguation.
# Referenced in services.toml / chats.toml via hidden_mcp_tool_sets = ["set-name", ...].
#
# [hidden_mcp_tool_sets.<name>]
# tools = ["tool_name", "server.tool_name", ...]
#
# Example — hide async management tools from img-mcp-async:
# [hidden_mcp_tool_sets.img-async-management]
# tools = ["wait_for_job", "cancel_job", "get_job_status", "list_jobs"]
#
# Duration values: TOML strings like "30s", "2m", "1m30s".
#
# Example — stdio transport with all options:
# [filesystem]
# transport = "stdio"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-filesystem", "/home/user/docs"]
# env = ["API_KEY=secret123"]
# timeout = "30s"
# keepalive = "0s"
#
# Example — http transport with all options:
# [github]
# transport = "http"
# url = "http://localhost:3001/mcp"
# timeout = "30s"
# keepalive = "30s"
#
# Example — http transport with API key authentication:
# [dave-web]
# transport = "http"
# url = "http://localhost:8081/message"
# headers = { "X-API-Key" = "dave_abc123..." }
# timeout = "30s"
# keepalive = "30s"
#
# Example — SSE transport (legacy, e.g. mark3labs/mcp-go servers) with API key:
# [dave-web]
# transport = "sse"
# url = "http://localhost:8081/sse"
# headers = { "X-API-Key" = "dave_abc123..." }
# timeout = "30s"
# keepalive = "30s"
#
# Example — img-mcp with sync/async dual paths (single binary, shared queue):
# [img-mcp]
# transport = "http"
# url = "http://localhost:8080/sync"
# headers = { "X-API-Key" = "your-shared-secret" }
# timeout = "2m"
# keepalive = "30s"
#
# [img-mcp-async]
# transport = "http"
# url = "http://localhost:8080/async"
# headers = { "X-API-Key" = "your-shared-secret" }
# timeout = "2m"
# keepalive = "30s"

[db-mcp]
transport = "stdio"
command = "mcps/db-mcp/db-mcp"
args = []
timeout = "30s"

