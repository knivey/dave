# MCP servers provide tools, resources, and prompts that chat commands can use.
# Tools are automatically injected into the LLM request when a command opts-in via mcps = [...].
# Resources and prompts are available via bridge functions for explicit use.
# Supported transports: "stdio" (spawn a local process) and "http" (streamable HTTP endpoint).
# Each MCP server has its own timeout for tool calls (defaults to 30s).
#
# [filesystem]
# transport = "stdio"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-filesystem", "/home/user/docs"]
# env = ["API_KEY=secret123"]
# timeout = "30s"
#
# [github]
# transport = "http"
# url = "http://localhost:3001/mcp"
# timeout = "30s"