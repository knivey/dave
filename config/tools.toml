# Tool commands call a single MCP tool and return the result directly (no LLM involved).
# Each section name becomes the command trigger (overridable with `regex`).
#
# Available options (per [section]):
#   mcp          (string, required)  MCP server name from mcps.toml
#   tool         (string, required)  Tool name on the MCP server
#   arg          (string)            Map user input to this tool argument name
#   args         (map)               Static key=value arguments passed to the tool
#   timeout      (duration)          Tool call timeout. Default: MCP server timeout from mcps.toml (30s)
#   skipbusy     (bool, default: false)  Skip queue check, allow running when queue is full
#   description  (string)            Short description for help listings
#   regex        (string, default: section name)  Regex for command trigger (no ^$ anchors)
#   sync         (bool, default: false)  Run synchronously (blocks queue). Default: async mode
#   async_tool   (string)            Async variant tool name. Default: tool + "_async"
#
# By default, tool commands run asynchronously:
#   - Calls async_tool instead of tool (default: <tool>_async)
#   - The MCP server must expose the async tool (auto-discovered, routes via tool name)
#   - Returns immediately with a feedback message, delivers result when job completes
#   - Works with both stdio (same server has all tools) and HTTP (separate async endpoint)
#   - Set sync = true to use blocking mode instead
#
# Duration values: TOML strings like "30s", "2m", "1m30s".
#
# Example with all options:
# [example-tool]
# description = "Example tool command"
# mcp = "my-mcp-server"
# tool = "my_tool"
# arg = "input"
# args = { format = "json", verbose = true }
# timeout = "1m"
# skipbusy = false
# regex = "example"
# sync = false
# async_tool = "my_tool_async"

[qwen]
description = "Qwen enhanced image generation"
mcp = "img-mcp"
tool = "enhance_and_generate"
arg = "prompt"
timeout = "2m"
args = { workflow = "qwen", output_format = "url" }

[qwenHD]
description = "Qwen HD enhanced image generation"
mcp = "img-mcp"
tool = "enhance_and_generate"
arg = "prompt"
timeout = "2m"
args = { workflow = "qwenHD", output_format = "url" }

[zimage]
description = "Zimage enhanced image generation"
mcp = "img-mcp"
tool = "enhance_and_generate"
arg = "prompt"
timeout = "2m"
args = { workflow = "zimage", output_format = "url" }

[queue]
description = "View generation queue status"
mcp = "img-mcp"
tool = "queue_status"
skipbusy = true
sync = true
