# fetch-mcp Configuration Reference
# ===================================
# All configuration is via environment variables (no config file is loaded).
# This file is documentation only.

# --- Server ---
# FETCH_SERVER_NAME     - Server name shown to MCP clients. Default: "fetch-mcp"
# FETCH_SERVER_VERSION  - Server version. Default: "0.1.0"
# FETCH_SERVER_ADDR     - HTTP listen address (only with --http). Default: ":8080"

# --- Fetch ---
# FETCH_USER_AGENT      - User-Agent header for HTTP requests. Default: "fetch-mcp/0.1.0"
# FETCH_TIMEOUT         - HTTP request timeout (Go duration). Default: "30s"
# FETCH_MAX_REDIRECTS   - Max HTTP redirects to follow. Default: 10
# FETCH_PROXY_URL       - Explicit proxy URL (e.g. "socks5://127.0.0.1:1080").
#                         If empty, uses HTTP_PROXY/HTTPS_PROXY/NO_PROXY env vars.

# --- Cache ---
# FETCH_CACHE_DSN       - Cache backend DSN for bartventer/httpcache. Default: "memcache://"
#                         Use "fscache://?appname=fetch-mcp" for filesystem cache.
# FETCH_CACHE_MARKDOWN_TTL - How long converted markdown stays in memory. Default: "15m"

# --- Readability ---
# FETCH_READABILITY_DISABLED - Set to "true"/"1"/"yes" to skip readability extraction
#                               and convert full HTML to markdown. Default: false
